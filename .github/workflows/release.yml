name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-slave:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            rust_target: aarch64-apple-darwin
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
            rust_target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ''
            rust_target: ''
          - platform: windows-latest
            args: ''
            rust_target: ''
            win_arch: x64
          - platform: windows-latest
            args: '--target aarch64-pc-windows-msvc'
            rust_target: aarch64-pc-windows-msvc
            win_arch: arm64

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: './crates/iec104sim-app -> ../../target'

      - name: Install frontend dependencies
        run: npm install
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: crates/iec104sim-app
          tagName: ${{ github.ref_name }}
          releaseName: '${{ github.ref_name }}'
          releaseBody: 'See the assets below to download the installers for your platform.'
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      # always() 让本步骤即使 tauri-action 因为 GitHub API 上传 race
      # (Not Found / delete-a-release-asset) 失败也继续: 此时 cargo 产物已
      # 经编译完成,便携 exe 仍可上传; job 整体状态仍会 failure 不掩盖问题。
      - name: Upload Windows portable exe (Slave)
        if: always() && matrix.platform == 'windows-latest'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ARCH="${{ matrix.win_arch }}"
          # cargo 产物名是 crate name (iec104sim-app.exe), 不是 Tauri productName。
          # productName 仅出现在 bundle/nsis/ 与 bundle/msi/ 下的安装包文件名里。
          if [ -n "${{ matrix.rust_target }}" ]; then
            SRC="target/${{ matrix.rust_target }}/release/iec104sim-app.exe"
          else
            SRC="target/release/iec104sim-app.exe"
          fi
          if [ ! -f "$SRC" ]; then
            echo "::warning::cargo binary $SRC not found — skipping portable upload"
            exit 0
          fi
          DEST="IEC104Slave_${VERSION}_${ARCH}-portable.exe"
          cp "$SRC" "$DEST"
          # `gh release upload --clobber` races against parallel matrix jobs
          # (404 "delete-a-release-asset"); retry before failing the build.
          for attempt in 1 2 3 4 5; do
            if gh release upload "$GITHUB_REF_NAME" "$DEST" --clobber; then exit 0; fi
            echo "::warning::release upload attempt $attempt failed, retrying in 10s"
            sleep 10
          done
          echo "::error::release upload failed after 5 attempts"; exit 1

  build-master:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            rust_target: aarch64-apple-darwin
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
            rust_target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ''
            rust_target: ''
          - platform: windows-latest
            args: ''
            rust_target: ''
            win_arch: x64
          - platform: windows-latest
            args: '--target aarch64-pc-windows-msvc'
            rust_target: aarch64-pc-windows-msvc
            win_arch: arm64

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: './crates/iec104master-app -> ../../target'

      - name: Install frontend dependencies
        run: npm install
        working-directory: master-frontend

      - name: Build frontend
        run: npm run build
        working-directory: master-frontend

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: crates/iec104master-app
          tagName: ${{ github.ref_name }}
          releaseName: '${{ github.ref_name }}'
          releaseBody: 'See the assets below to download the installers for your platform.'
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      # always() 让本步骤即使 tauri-action 失败也继续 (同 Slave 注释)。
      - name: Upload Windows portable exe (Master)
        if: always() && matrix.platform == 'windows-latest'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ARCH="${{ matrix.win_arch }}"
          # cargo 产物名是 crate name (iec104master-app.exe), 不是 Tauri productName。
          if [ -n "${{ matrix.rust_target }}" ]; then
            SRC="target/${{ matrix.rust_target }}/release/iec104master-app.exe"
          else
            SRC="target/release/iec104master-app.exe"
          fi
          if [ ! -f "$SRC" ]; then
            echo "::warning::cargo binary $SRC not found — skipping portable upload"
            exit 0
          fi
          DEST="IEC104Master_${VERSION}_${ARCH}-portable.exe"
          cp "$SRC" "$DEST"
          # `gh release upload --clobber` races against parallel matrix jobs
          # (404 "delete-a-release-asset"); retry before failing the build.
          for attempt in 1 2 3 4 5; do
            if gh release upload "$GITHUB_REF_NAME" "$DEST" --clobber; then exit 0; fi
            echo "::warning::release upload attempt $attempt failed, retrying in 10s"
            sleep 10
          done
          echo "::error::release upload failed after 5 attempts"; exit 1

  publish-manifest:
    needs: [build-slave, build-master]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install script deps
        working-directory: scripts
        run: npm install --no-audit --no-fund
      - name: Generate manifests
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/gen-update-manifest.mjs ${{ github.ref_name }}
      - name: Upload manifests to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for attempt in 1 2 3 4 5; do
            if gh release upload ${{ github.ref_name }} latest-slave.json latest-master.json --clobber; then exit 0; fi
            echo "::warning::manifest upload attempt $attempt failed, retrying in 10s"
            sleep 10
          done
          echo "::error::manifest upload failed after 5 attempts"; exit 1

      - name: Render rich release body from CHANGELOG
        run: node scripts/build-release-notes.mjs ${{ github.ref_name }}

      - name: Replace release body
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit ${{ github.ref_name }} --notes-file RELEASE_BODY.md
